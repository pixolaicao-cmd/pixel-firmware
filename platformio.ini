[env:m5stack-cores3]
platform  = espressif32
board     = m5stack-cores3
framework = arduino

; PSRAM（CoreS3 板载 8MB PSRAM）
board_build.psram      = enabled
board_upload.flash_size = 16MB

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    ; M5Stack 统一库（LCD + 触摸 + 内置麦克风 + 扬声器功放初始化）
    m5stack/M5Unified @ ^0.2.2
    ; JSON 解析
    bblanchon/ArduinoJson @ ^7.3.1
    ; MP3 解码播放（内存缓冲区 → I2S 扬声器）
    earlephilhower/ESP8266Audio @ ^1.9.7
    ; I2S 驱动（ESP-IDF 内置，PlatformIO 无需单独添加）

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    ; 告知 M5Unified 使用 CoreS3
    -DM5UNIFIED_TARGET=M5STACK_CORES3
